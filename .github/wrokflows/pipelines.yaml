name: CI/CD Pipeline

on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKERHUB_IMAGE: nfsr/wine-mlops   # <-- change if your Docker Hub repo name differs

jobs:
  # ──────────────────────────────────────────────
  # 1. LINT & FORMAT CHECK
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort bandit

      - name: Check code formatting (black)
        run: black --check .

      - name: Check import sorting (isort)
        run: isort --check-only .

      - name: Run flake8
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__,build,dist

      - name: Security scan (bandit)
        run: bandit -r . -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

  # ──────────────────────────────────────────────
  # 2. TEST (with real Postgres + MinIO service containers)
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mlflow_test
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflowpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin123
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: server /data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      # Two separate calls — 'mb' is the mc binary's own subcommand, not a shell
      # command to chain onto the container's entrypoint.
      - name: Create MinIO bucket
        run: |
          docker run --rm --network=host minio/mc alias set local http://localhost:9000 minioadmin minioadmin123
          docker run --rm --network=host minio/mc mb local/mlflow || true

      - name: Run tests with coverage
        env:
          MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin123
          POSTGRES_DB: mlflow_test
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflowpass
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-fail-under=40

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            htmlcov/
            coverage.xml

  # ──────────────────────────────────────────────
  # 3. BUILD, SCAN & PUSH DOCKER IMAGE (Docker Hub)
  # ──────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # flip to "1" once known issues are cleaned up, to hard-fail on new ones

      # - name: Log in to Docker Hub
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: Push to Docker Hub
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       ${{ env.DOCKERHUB_IMAGE }}:latest
      #       ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 4. DEPLOY — disabled until a real target exists.
  # Uncomment and fill in when you have somewhere to deploy to
  # (Render / EC2 / a VPS, etc.) — a stub step here would just
  # sit red/no-op forever and looks worse than not having it.
